<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品可行性分析报告渲染器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #e4e4e7;
            margin: 0;
        }
        .glass-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
        }
        .glass-card-sm {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
        }
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        /* Sidebar */
        #sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 280px;
            background: rgba(15,12,41,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
            z-index: 100;
            padding: 20px 0;
            transition: transform 0.3s ease;
        }
        #sidebar.hidden { transform: translateX(-280px); }
        .nav-group-title {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 20px 6px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px 8px 28px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            border-left: 3px solid transparent;
        }
        .nav-item:hover {
            background: rgba(96,165,250,0.1);
            color: #e4e4e7;
            border-left-color: rgba(96,165,250,0.4);
        }
        .nav-item.active {
            background: rgba(96,165,250,0.15);
            color: #60a5fa;
            border-left-color: #60a5fa;
        }
        .nav-item .num {
            font-size: 10px;
            opacity: 0.5;
            width: 18px;
            text-align: center;
        }
        /* Main */
        #main-wrap {
            margin-left: 280px;
            transition: margin-left 0.3s ease;
        }
        #main-wrap.full { margin-left: 0; }
        /* Tags */
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .tag-excellent { background: rgba(34,197,94,0.2); color: #4ade80; }
        .tag-good { background: rgba(96,165,250,0.2); color: #93c5fd; }
        .tag-normal { background: rgba(251,191,36,0.2); color: #fcd34d; }
        .tag-poor { background: rgba(249,115,22,0.2); color: #fdba74; }
        .tag-risk { background: rgba(239,68,68,0.2); color: #fca5a5; }
        /* Section underline */
        .section-title {
            position: relative;
            display: inline-block;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -6px; left: 0;
            width: 50px; height: 3px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            border-radius: 2px;
        }
        /* Grade badges */
        .grade-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px; height: 64px;
            border-radius: 50%;
            font-size: 28px;
            font-weight: 700;
            border: 3px solid;
        }
        .grade-S { border-color: #4ade80; color: #4ade80; background: rgba(34,197,94,0.1); }
        .grade-A { border-color: #60a5fa; color: #60a5fa; background: rgba(96,165,250,0.1); }
        .grade-B { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.1); }
        .grade-C { border-color: #fcd34d; color: #fcd34d; background: rgba(251,191,36,0.1); }
        .grade-D { border-color: #fb923c; color: #fb923c; background: rgba(249,115,22,0.1); }
        .grade-F { border-color: #f87171; color: #f87171; background: rgba(239,68,68,0.1); }
        /* Table */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        .data-table th {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .data-table td {
            padding: 10px 14px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.8);
        }
        .data-table tr:hover td { background: rgba(255,255,255,0.03); }
        /* SWOT quadrant */
        .swot-quadrant {
            padding: 20px;
            border-radius: 12px;
            flex: 1;
            min-width: 0;
        }
        .swot-S { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); }
        .swot-W { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); }
        .swot-O { background: rgba(96,165,250,0.08); border: 1px solid rgba(96,165,250,0.2); }
        .swot-T { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.2); }
        /* Canvas grid */
        .canvas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: auto auto auto;
            gap: 10px;
        }
        .canvas-cell {
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .canvas-cell .cell-title {
            font-size: 11px;
            font-weight: 600;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        /* Timeline */
        .timeline-item {
            position: relative;
            padding-left: 36px;
            padding-bottom: 24px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 12px; top: 28px; bottom: 0;
            width: 2px;
            background: rgba(255,255,255,0.15);
        }
        .timeline-item:last-child::before { display: none; }
        .timeline-item .dot {
            position: absolute;
            left: 4px; top: 8px;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border: 2px solid #24243e;
        }
        /* Five forces diamond */
        .force-item {
            text-align: center;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        /* Input area */
        #json-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            color: #e4e4e7;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            resize: vertical;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
        }
        #json-input:focus {
            outline: none;
            border-color: rgba(96,165,250,0.5);
            box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
        }
        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            color: #fff;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        /* No data */
        .no-data {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.35);
            font-size: 14px;
        }
        /* Cover */
        .cover-section {
            text-align: center;
            padding: 80px 40px;
        }
        .cover-section h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .cover-section .grade-big {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
        }
        /* Check status */
        .check-pass { color: #4ade80; font-weight: bold; }
        .check-fail { color: #f87171; font-weight: bold; }
        .check-warn { color: #fcd34d; font-weight: bold; }
        /* Print */
        @media print {
            body { background: #fff !important; color: #1a1a1a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            #sidebar, #input-area, #export-bar, #toggle-sidebar, .no-print { display: none !important; }
            #main-wrap { margin-left: 0 !important; }
            .glass-card, .glass-card-sm { background: #f8f9fa !important; border-color: #dee2e6 !important; backdrop-filter: none !important; }
            .gradient-text { -webkit-text-fill-color: #4f46e5 !important; }
            .data-table th { background: #e9ecef !important; color: #495057 !important; }
            .data-table td { color: #343a40 !important; border-color: #dee2e6 !important; }
            .section-title { color: #1a1a1a !important; }
            .cover-section h1 { color: #1a1a1a !important; }
            .swot-quadrant, .force-item, .canvas-cell { background: #f1f3f5 !important; border-color: #dee2e6 !important; }
            .swot-quadrant .cell-title, .canvas-cell .cell-title { color: #6f42c1 !important; }
            canvas { max-width: 100% !important; }
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
        /* Responsive */
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-280px); }
            #sidebar.show { transform: translateX(0); }
            #main-wrap { margin-left: 0 !important; }
            .canvas-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav id="sidebar">
        <div style="padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 10px;">
            <div class="gradient-text" style="font-size: 15px; font-weight: 700;">可行性分析报告</div>
            <div style="font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px;">Feasibility Report Renderer</div>
        </div>
        <div id="nav-items"></div>
    </nav>

    <!-- Toggle sidebar button (mobile) -->
    <button id="toggle-sidebar" class="btn-secondary no-print" onclick="toggleSidebar()" style="position:fixed;top:12px;left:12px;z-index:200;font-size:18px;padding:6px 10px;">&#9776;</button>

    <!-- Main Content -->
    <div id="main-wrap">
        <!-- Input Area -->
        <div id="input-area" class="no-print" style="padding: 24px;">
            <div class="glass-card" style="padding: 24px;">
                <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
                    <div>
                        <h2 style="font-size:18px;font-weight:700;color:#e4e4e7;">JSON 数据输入</h2>
                        <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:2px;">粘贴 LLM 输出的结构化 JSON，点击渲染生成报告</p>
                    </div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        <button class="btn-primary" onclick="renderReport()">渲染报告</button>
                        <button class="btn-secondary" onclick="loadSample()">加载示例</button>
                        <button class="btn-secondary" onclick="document.getElementById('json-input').value='';clearReport();">清空</button>
                    </div>
                </div>
                <textarea id="json-input" rows="10" placeholder='在此粘贴 JSON 数据...\n\n格式参考设计文档第4节的 JSON Schema'></textarea>
                <div id="parse-status" style="margin-top:8px;font-size:12px;color:rgba(255,255,255,0.45);"></div>
            </div>
        </div>

        <!-- Export Bar -->
        <div id="export-bar" class="no-print" style="display:none;padding: 0 24px 16px;">
            <div class="glass-card-sm" style="padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                <span style="font-size:13px;color:rgba(255,255,255,0.6);">报告已生成，你可以：</span>
                <div style="display:flex;gap:8px;">
                    <button class="btn-secondary" onclick="downloadHTML()">下载 HTML</button>
                    <button class="btn-secondary" onclick="downloadMarkdown()">下载 Markdown</button>
                    <button class="btn-primary" onclick="window.print()" style="padding:8px 16px;font-size:13px;">导出 PDF</button>
                </div>
            </div>
        </div>

        <!-- Report Preview -->
        <div id="report" style="padding: 0 24px 60px; max-width: 960px; margin: 0 auto;">
            <div class="no-data" style="padding: 100px 40px;">
                <div style="font-size:48px;opacity:0.15;margin-bottom:16px;">&#128202;</div>
                <div style="font-size:16px;">尚未生成报告</div>
                <div style="font-size:13px;margin-top:4px;">粘贴 JSON 数据并点击"渲染报告"开始</div>
            </div>
        </div>
    </div>

<script>
// ============================================================
// Global state
// ============================================================
let currentData = null;
let chartInstances = [];

// ============================================================
// Navigation
// ============================================================
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('show');
}

// Active nav on scroll
function updateActiveNav() {
    const sections = document.querySelectorAll('[id^="sec-"], [id="cover"]');
    let activeId = '';
    sections.forEach(sec => {
        const rect = sec.getBoundingClientRect();
        if (rect.top <= 120) activeId = sec.id;
    });
    document.querySelectorAll('#sidebar .nav-item').forEach(item => {
        item.classList.toggle('active', item.getAttribute('data-target') === activeId);
    });
}
window.addEventListener('scroll', updateActiveNav, { passive: true });

// ============================================================
// Helpers
// ============================================================
function safeGet(obj, path, fallback = '') {
    const keys = path.split('.');
    let cur = obj;
    for (const k of keys) {
        if (cur && typeof cur === 'object' && k in cur) { cur = cur[k]; }
        else return fallback;
    }
    return cur ?? fallback;
}

function noDataHTML() {
    return '<div class="glass-card-sm" style="padding:24px;text-align:center;margin-top:20px;"><div style="font-size:13px;color:rgba(255,255,255,0.4);">此章节暂无数据</div><div style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:4px;">JSON 中未提供该部分内容</div></div>';
}

function impactTag(level) {
    const map = { '高': 'tag-risk', '中': 'tag-normal', '低': 'tag-good' };
    return `<span class="tag ${map[level] || 'tag-normal'}">${level || '--'}</span>`;
}

function levelTag(level) {
    const map = { '高': 'tag-risk', '中': 'tag-normal', '低': 'tag-good' };
    return `<span class="tag ${map[level] || 'tag-normal'}">${level || '--'}</span>`;
}

function checkStatusIcon(status) {
    const map = { 'pass': ['check-pass','&#10003;'], 'fail': ['check-fail','&#10007;'], 'warn': ['check-warn','&#9888;'] };
    const [cls, icon] = map[status] || ['check-warn','?'];
    return `<span class="${cls}" style="font-size:18px;">${icon}</span>`;
}

function gradeClass(g) {
    const g2 = (g || '').toUpperCase();
    if (g2 === 'S') return 'grade-S';
    if (g2 === 'A') return 'grade-A';
    if (g2 === 'B') return 'grade-B';
    if (g2 === 'C') return 'grade-C';
    if (g2 === 'D') return 'grade-D';
    return 'grade-F';
}

function destroyCharts() {
    chartInstances.forEach(c => { try { c.destroy(); } catch(e){} });
    chartInstances = [];
}

// ============================================================
// Section renderers
// ============================================================

function renderCover(d) {
    const meta = d.meta || {};
    const es = d.executive_summary || {};
    const km = es.key_metrics || {};
    // 支持两种格式：众筹格式(crowdfunding_grade/feasibility_total) 和通用格式(key_metrics)
    const isCrowdfunding = !!(es.crowdfunding_grade || (meta.analysis_type === 'crowdfunding'));
    const grade = isCrowdfunding ? (es.crowdfunding_grade || '?') : (km.grade || '?');
    const gradeLabel = isCrowdfunding ? (es.grade_label || '') : (km.grade_label || es.recommendation || '');
    const totalScore = isCrowdfunding ? (es.feasibility_total || 0) : (km.total_score || 0);
    const conclusion = isCrowdfunding ? (es.grade_explanation || es.one_line_conclusion || '') : (km.conclusion || es.conclusion || '');
    const date = (meta.generated_at || meta.analyzed_at) ? new Date(meta.generated_at || meta.analyzed_at).toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'}) : '';
    const category = meta.category || '';
    const catLabels = {hardware:'硬件/消费品',saas:'SaaS/效率工具',service:'服务/咨询',content:'内容/社群',b2b:'B2B/企业级',platform:'平台/双边市场',community:'社群/平台'};
    const catLabel = catLabels[category] || category || '通用';

    return `
    <div id="cover" class="cover-section">
        <div style="font-size:12px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:2px;margin-bottom:24px;">产品可行性分析报告</div>
        <h1 class="gradient-text">${meta.product_name || '未命名产品'}</h1>
        <div style="margin:8px 0 24px;"><span class="tag tag-good" style="font-size:13px;">${catLabel}</span></div>
        <div class="grade-big gradient-text">${grade}</div>
        <div style="font-size:16px;color:rgba(255,255,255,0.6);margin:8px 0 32px;">${gradeLabel}</div>
        ${totalScore ? `
        <div style="display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:32px;">
            <div class="glass-card-sm" style="padding:16px 24px;text-align:center;min-width:120px;">
                <div style="font-size:11px;color:rgba(255,255,255,0.4);">总分</div>
                <div style="font-size:24px;font-weight:700;color:#60a5fa;">${totalScore}<span style="font-size:12px;color:rgba(255,255,255,0.35);">/100</span></div>
            </div>
            ${!isCrowdfunding && km.market_size_tam ? `<div class="glass-card-sm" style="padding:16px 24px;text-align:center;min-width:120px;">
                <div style="font-size:11px;color:rgba(255,255,255,0.4);">TAM</div>
                <div style="font-size:24px;font-weight:700;color:#a78bfa;">${km.market_size_tam}</div>
            </div>` : ''}
            ${!isCrowdfunding && km.gross_margin_pct ? `<div class="glass-card-sm" style="padding:16px 24px;text-align:center;min-width:120px;">
                <div style="font-size:11px;color:rgba(255,255,255,0.4);">毛利率</div>
                <div style="font-size:24px;font-weight:700;color:#4ade80;">${km.gross_margin_pct}%</div>
            </div>` : ''}
        </div>` : ''}
        ${conclusion ? `<div style="font-size:13px;color:rgba(255,255,255,0.5);max-width:640px;margin:0 auto 24px;line-height:1.6;">${conclusion}</div>` : ''}
        <div style="font-size:13px;color:rgba(255,255,255,0.3);">${date}</div>
        <div style="margin-top:32px;font-size:11px;color:rgba(255,255,255,0.2);max-width:600px;margin-left:auto;margin-right:auto;line-height:1.6;">
            免责声明：本报告由 AI 辅助生成，仅供决策参考，不构成投资建议。所有分析基于公开信息和假设，实际情况可能存在差异。请在正式决策前进行独立验证。
        </div>
    </div>`;
}

function renderExecutiveSummary(d) {
    const es = d.executive_summary;
    if (!es) return noDataHTML();
    const isCrowdfunding = !!(es.crowdfunding_grade || (d.meta && d.meta.analysis_type === 'crowdfunding'));
    const km = es.key_metrics || {};

    if (isCrowdfunding) {
        // 众筹格式
        let failureHTML = '';
        if (es.hit_failure_patterns && es.hit_failure_patterns.length) {
            failureHTML = `<div style="margin-top:16px;"><div style="font-size:13px;font-weight:600;color:#f87171;margin-bottom:8px;">命中失败模式</div>` +
                es.hit_failure_patterns.map(f => `<div style="font-size:13px;color:rgba(255,255,255,0.7);padding:4px 0;padding-left:16px;border-left:2px solid rgba(239,68,68,0.3);margin-bottom:6px;">${f}</div>`).join('') +
                `</div>`;
        }
        let weaknessesHTML = '';
        if (es.key_weaknesses && es.key_weaknesses.length) {
            weaknessesHTML = `<div style="margin-top:16px;"><div style="font-size:13px;font-weight:600;color:#fbbf24;margin-bottom:8px;">关键弱点</div>` +

    const colors = { political:'rgba(239,68,68,0.08)', economic:'rgba(96,165,250,0.08)', social:'rgba(167,139,250,0.08)', technological:'rgba(34,197,94,0.08)' };
    const bcolors = { political:'rgba(239,68,68,0.2)', economic:'rgba(96,165,250,0.2)', social:'rgba(167,139,250,0.2)', technological:'rgba(34,197,94,0.2)' };

    if (!s) return noDataHTML();
    const quads = [
        { key:'strengths', label:'S - 优势 Strengths', cls:'swot-S', color:'#4ade80' },

function renderTimeline(d) {

        return `

            <div>
                ${tl.phases.map((p,i) => `<div class="timeline-item">
                    <div class="dot"></div>
                    <div class="glass-card-sm" style="padding:16px;">
                        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px;">
                            <span style="font-size:15px;font-weight:700;">${p.phase}</span>
                            <span class="tag tag-good">${p.period}</span>
                        </div>
                        <div style="font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:8px;">目标：${p.goal}</div>

                            ${p.tasks.map(t => `<span style="display:inline-block;background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:4px;margin:2px;">${t}</span>`).join('')}
                        </div>` : ''}
                        ${p.success_criteria ? `<div style="font-size:12px;color:rgba(96,165,250,0.7);margin-top:6px;">成功标准：${p.success_criteria}</div>` : ''}
                    </div>
                </div>`).join('')}
            </div>
        </div>`;
    }
    // 众筹格式：7_day_tasks, key_shortcomings, 30_day_plan, verdict, milestone_conditions
    let tasksHTML = '';
    if (tl['7_day_tasks'] && tl['7_day_tasks'].length) {
        tasksHTML = `<div style="margin-bottom:20px;"><div style="font-size:13px;font-weight:600;margin-bottom:10px;">7 天关键任务</div>
            <div style="display:grid;gap:8px;">
                ${tl['7_day_tasks'].map(t => `<div class="glass-card-sm" style="padding:12px;font-size:13px;color:rgba(255,255,255,0.8);line-height:1.6;">${t}</div>`).join('')}
            </div></div>`;
    }
    let shortcomingsHTML = '';
    if (tl.key_shortcomings && tl.key_shortcomings.length) {
        shortcomingsHTML = `<div style="margin-bottom:20px;"><div style="font-size:13px;font-weight:600;margin-bottom:10px;">关键短板</div>
            <div style="display:grid;gap:8px;">
                ${tl.key_shortcomings.map(s => `<div class="glass-card-sm" style="padding:12px;font-size:13px;color:rgba(251,191,36,0.9);">${s}</div>`).join('')}
            </div></div>`;
    }
    let planHTML = '';
    if (tl['30_day_plan'] && tl['30_day_plan'].length) {
        planHTML = `<div style="margin-bottom:20px;"><div style="font-size:13px;font-weight:600;margin-bottom:10px;">30 天推进计划</div>
            <div style="display:grid;gap:8px;">
                ${tl['30_day_plan'].map((p,i) => `<div class="timeline-item">
                    <div class="dot"></div>
                    <div class="glass-card-sm" style="padding:12px;font-size:13px;color:rgba(255,255,255,0.8);">${p}</div>
                </div>`).join('')}
            </div></div>`;
    }
    return `
    <div id="sec-timeline" style="margin-top:48px;">
        <h3 class="section-title gradient-text">时间规划</h3>
        <p style="font-size:13px;color:rgba(255,255,255,0.5);margin:12px 0 20px;">从验证到规模化的阶段性时间线和里程碑。</p>
        ${tl.verdict ? `<div class="glass-card-sm" style="padding:16px;margin-bottom:20px;background:rgba(96,165,250,0.08);border-color:rgba(96,165,250,0.2);"><div style="font-size:12px;font-weight:600;color:#60a5fa;margin-bottom:6px;">结论</div><div style="font-size:14px;color:rgba(255,255,255,0.8);line-height:1.7;">${tl.verdict}</div></div>` : ''}
        ${tasksHTML}
        ${shortcomingsHTML}
        ${planHTML}

    </div>`;
}

            ${dims.map(dm => {
                const dmMax = dm.max || dm.max_score || 1;
                const pct = dmMax > 0 ? Math.round(dm.score / dmMax * 100) : 0;
                const barColor = pct >= 80 ? '#4ade80' : pct >= 60 ? '#60a5fa' : pct >= 40 ? '#fcd34d' : '#f87171';
                return `<tr>
                    <td style="font-weight:600;">${dm.name}</td>
                    <td>${dm.weight}</td>
                    <td style="font-weight:600;color:${barColor};">${dm.score}</td>
                    <td>${dm.max || dm.max_score || '--'}</td>
                    <td><div style="display:flex;align-items:center;gap:8px;"><div style="flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;min-width:60px;"><div style="width:${pct}%;height:100%;background:${barColor};border-radius:3px;"></div></div><span style="font-size:11px;color:rgba(255,255,255,0.5);">${pct}%</span></div></td>
                    <td style="font-size:12px;">${dm.notes||''}</td>
                </tr>`;
            }).join('')}
        </tbody></table></div>` : ''}
    </div>`;
}

function renderCharts(d) {
    // Radar chart for feasibility score
    const fs = d.feasibility_score;
    if (fs && fs.dimensions && fs.dimensions.length) {
        const ctx = document.getElementById('chart-radar');
        if (ctx) {
            const labels = fs.dimensions.map(dm => dm.name);
            const data = fs.dimensions.map(dm => { const dmMax = dm.max || dm.max_score || 1; return dmMax > 0 ? Math.round(dm.score/dmMax*100) : 0; });
            const chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels,
                    datasets: [{
                        label: '得分率 %',
                        data,
                        backgroundColor: 'rgba(96,165,250,0.15)',
                        borderColor: '#60a5fa',
                        pointBackgroundColor: '#60a5fa',
                        pointBorderColor: '#fff',
                        pointRadius: 4,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { display: false, stepSize: 20 },
                            grid: { color: 'rgba(255,255,255,0.08)' },
                            angleLines: { color: 'rgba(255,255,255,0.08)' },
                            pointLabels: { color: 'rgba(255,255,255,0.6)', font: { size: 10 } }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
            chartInstances.push(chart);
        }
    }

    // Financial projections chart
    const fm = d.financial_model;
    if (fm && fm.projections && fm.projections.length) {
        const ctx2 = document.getElementById('chart-financial');
        if (ctx2) {
            const chart2 = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: fm.projections.map(p => p.month),
                    datasets: [
                        {
                            label: '收入',
                            data: fm.projections.map(p => p.revenue),
                            borderColor: '#4ade80',
                            backgroundColor: 'rgba(34,197,94,0.1)',
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: '成本',
                            data: fm.projections.map(p => p.cost),
                            borderColor: '#f87171',
                            backgroundColor: 'rgba(239,68,68,0.1)',
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: '利润',
                            data: fm.projections.map(p => p.profit),
                            borderColor: '#60a5fa',
                            backgroundColor: 'rgba(96,165,250,0.1)',
                            fill: true,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 } } },
                        y: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 }, callback: v => '¥'+v.toLocaleString() } }
                    },
                    plugins: {
                        legend: { labels: { color: 'rgba(255,255,255,0.6)', font: { size: 11 } } }
                    }
                }
            });
            chartInstances.push(chart2);
        }
    }

    // Market sizing bar chart
    const ms = d.market_sizing;
    if (ms && ms.tam && ms.sam && ms.som) {
        const parseNum = s => { if (!s) return 0; return parseFloat(String(s).replace(/[^0-9.]/g,'')) || 0; };
        const tamNum = parseNum(ms.tam.value);
        const samNum = parseNum(ms.sam.value);
        const somNum = parseNum(ms.som.value);
        if (tamNum > 0 && samNum > 0 && somNum > 0) {
            const ctx3 = document.getElementById('chart-market-sizing');
            if (ctx3) {
                const chart3 = new Chart(ctx3, {
                    type: 'bar',
                    data: {
                        labels: ['TAM (总市场)', 'SAM (可服务市场)', 'SOM (可获得市场)'],
                        datasets: [{
                            data: [tamNum, samNum, somNum],
                            backgroundColor: ['rgba(96,165,250,0.6)', 'rgba(167,139,250,0.6)', 'rgba(74,222,128,0.6)'],
                            borderColor: ['#60a5fa', '#a78bfa', '#4ade80'],
                            borderWidth: 2,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 } } },
                            y: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.6)', font: { size: 11 } } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
                chartInstances.push(chart3);
            }
        }
    }
}

function buildNavHTML(analysisType) {

        'sec-swot_analysis', 'sec-case_studies',
        'sec-risk_analysis',
        'sec-crowdfunding', 'sec-timeline'

    const generalOrder = [
        'cover', 'sec-executive_summary', 'sec-project_profile',
        'sec-market_analysis', 'sec-pest_analysis', 'sec-porter_five_forces',
        'sec-swot_analysis', 'sec-business_model_canvas', 'sec-case_studies',
        'sec-market_sizing', 'sec-financial_model', 'sec-growth_flywheel',
        'sec-tech_architecture', 'sec-risk_analysis', 'sec-feasibility_score',
        'sec-exit_strategy', 'sec-timeline'
    ];
    const order = analysisType === 'crowdfunding' ? crowdfundingOrder : generalOrder;
    return order.map(id => {
        const label = NAV_MAP[id] || id;
        return `<a class="nav-item" data-target="${id}">${label}</a>`;
    }).join('\n');
}

// Re-bind nav click handlers after dynamic generation
function bindNavHandlers() {
    document.querySelectorAll('#sidebar .nav-item').forEach(item => {
        item.addEventListener('click', function(e) {
            e.preventDefault();
            const targetId = this.getAttribute('data-target');
            const el = document.getElementById(targetId);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('show');
        });
    });
}

// ============================================================
// Main render
// ============================================================
function renderReport() {
    const input = document.getElementById('json-input').value.trim();
    const status = document.getElementById('parse-status');

    if (!input) {
        status.innerHTML = '<span style="color:#f87171;">请粘贴 JSON 数据</span>';
        return;
    }

    let data;
    try {
        data = JSON.parse(input);
    } catch (e) {
        status.innerHTML = `<span style="color:#f87171;">JSON 解析失败：${e.message}</span>`;
        return;
    }

    try {
    // Normalize: wrap old format into new schema
    if (data.product && !data.meta) {
        data.meta = {
            product_name: data.product.name || '',
            category: data.product.category || data.category || '',
            generated_at: data.generated_at || new Date().toISOString(),
            analyzer: '',
            schema_version: '1.0'
        };
    }
    if (!data.meta && data.product_name) {
        data.meta = { product_name: data.product_name, category: '', generated_at: '', analyzer: '', schema_version: '1.0' };
    }

    currentData = data;
    status.innerHTML = '<span style="color:#4ade80;">JSON 解析成功，正在渲染报告...</span>';

    destroyCharts();

    // Determine analysis type
    const analysisType = (data.meta && data.meta.analysis_type) || 'general';
    const isCrowdfunding = analysisType === 'crowdfunding';

    // Build dynamic navigation
    document.getElementById('nav-items').innerHTML = buildNavHTML(analysisType);
    bindNavHandlers();

    const reportEl = document.getElementById('report');
    let html = '';

    // Render cover (always)
    html += renderCover(data);

    if (isCrowdfunding) {
        // Crowdfunding template
        html += renderExecutiveSummary(data);
        html += renderFeasibilityScore(data);
        html += renderProjectProfile(data);
        html += renderSWOT(data);
        html += renderCaseStudies(data);
        html += renderRiskAnalysis(data);
        html += renderCrowdfunding(data);
        html += renderTimeline(data);
    } else {
        // General template
        html += renderExecutiveSummary(data);
        html += renderProjectProfile(data);
        html += renderMarketAnalysis(data);
        html += renderPEST(data);
        html += renderPorterFive(data);
        html += renderSWOT(data);
        html += renderBMC(data);
        html += renderCaseStudies(data);
        html += renderMarketSizing(data);
        html += renderFinancialModel(data);
        html += renderGrowthFlywheel(data);
        html += renderTechArchitecture(data);
        html += renderRiskAnalysis(data);
        html += renderFeasibilityScore(data);
        html += renderExitStrategy(data);
        html += renderTimeline(data);
    }

    reportEl.innerHTML = html;

    // Render charts after DOM is ready
    requestAnimationFrame(() => {
        renderCharts(data);
    });

    document.getElementById('export-bar').style.display = 'block';
    status.innerHTML = '<span style="color:#4ade80;">报告渲染完成</span>';

    // Scroll to cover
    document.getElementById('cover').scrollIntoView({ behavior: 'smooth' });

    } catch (renderError) {
        console.error('报告渲染错误:', renderError);
        status.innerHTML = `<span style="color:#f87171;">报告渲染过程中发生错误：${renderError.message}</span><br><span style="font-size:12px;color:rgba(255,255,255,0.5);">请检查浏览器控制台获取详细信息</span>`;
        // 尝试输出已渲染的部分内容
        if (reportEl && html) {
            reportEl.innerHTML = html + `<div class="glass-card-sm" style="padding:24px;margin-top:20px;background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.3);text-align:center;"><div style="font-size:14px;color:#f87171;font-weight:600;">渲染过程中发生错误</div><div style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:8px;">${renderError.message}</div><div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;">请检查浏览器控制台获取完整错误信息</div></div>`;
        }
    }
}

function clearReport() {
    document.getElementById('report').innerHTML = `<div class="no-data" style="padding: 100px 40px;">
        <div style="font-size:48px;opacity:0.15;margin-bottom:16px;">&#128202;</div>
        <div style="font-size:16px;">尚未生成报告</div>
        <div style="font-size:13px;margin-top:4px;">粘贴 JSON 数据并点击"渲染报告"开始</div>
    </div>`;
    document.getElementById('export-bar').style.display = 'none';
    document.getElementById('parse-status').innerHTML = '';
    currentData = null;
    destroyCharts();
}

function generateChartScript(d) {
    // Generate inline chart.js code for exported HTML
    let scripts = '';
    const fs = d.feasibility_score;
    if (fs && fs.dimensions && fs.dimensions.length) {
        const labels = JSON.stringify(fs.dimensions.map(dm => dm.name));
        const data = JSON.stringify(fs.dimensions.map(dm => dm.max > 0 ? Math.round(dm.score/dm.max*100) : 0));
        scripts += `
        (function(){
            var ctx = document.getElementById('chart-radar');
            if (ctx) {
                new Chart(ctx, { type: 'radar', data: { labels: ${labels}, datasets: [{ label: '得分率 %', data: ${data}, backgroundColor: 'rgba(96,165,250,0.15)', borderColor: '#60a5fa', pointBackgroundColor: '#60a5fa', pointRadius: 4, borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { r: { beginAtZero: true, max: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.08)' }, angleLines: { color: 'rgba(255,255,255,0.08)' }, pointLabels: { color: 'rgba(255,255,255,0.6)', font: { size: 10 } } } }, plugins: { legend: { display: false } } } });
            }
        })();`;
    }
    const fm = d.financial_model;
    if (fm && fm.projections && fm.projections.length) {
        const labels = JSON.stringify(fm.projections.map(p => p.month));
        const rev = JSON.stringify(fm.projections.map(p => p.revenue));
        const cost = JSON.stringify(fm.projections.map(p => p.cost));
        const profit = JSON.stringify(fm.projections.map(p => p.profit));
        scripts += `
        (function(){
            var ctx = document.getElementById('chart-financial');
            if (ctx) {
                new Chart(ctx, { type: 'line', data: { labels: ${labels}, datasets: [{ label: '收入', data: ${rev}, borderColor: '#4ade80', backgroundColor: 'rgba(34,197,94,0.1)', fill: true, tension: 0.3 }, { label: '成本', data: ${cost}, borderColor: '#f87171', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.3 }, { label: '利润', data: ${profit}, borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.1)', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: 'rgba(255,255,255,0.5)' } }, y: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: 'rgba(255,255,255,0.5)' } } }, plugins: { legend: { labels: { color: 'rgba(255,255,255,0.6)' } } } } });
            }
        })();`;
    }
    const ms = d.market_sizing;
    if (ms && ms.tam && ms.sam && ms.som) {
        const parseNum = s => { if (!s) return 0; return parseFloat(String(s).replace(/[^0-9.]/g,'')) || 0; };
        const t = parseNum(ms.tam.value), s = parseNum(ms.sam.value), o = parseNum(ms.som.value);
        if (t > 0 && s > 0 && o > 0) {
            scripts += `
            (function(){
                var ctx = document.getElementById('chart-market-sizing');
                if (ctx) {
                    new Chart(ctx, { type: 'bar', data: { labels: ['TAM (总市场)', 'SAM (可服务市场)', 'SOM (可获得市场)'], datasets: [{ data: [${t},${s},${o}], backgroundColor: ['rgba(96,165,250,0.6)','rgba(167,139,250,0.6)','rgba(74,222,128,0.6)'], borderColor: ['#60a5fa','#a78bfa','#4ade80'], borderWidth: 2, borderRadius: 8 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: 'rgba(255,255,255,0.5)' } }, y: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.6)' } } }, plugins: { legend: { display: false } } } });
                }
            })();`;
        }
    }
    return scripts;
}

function downloadMarkdown() {
    if (!currentData) return;
    const d = currentData;
    const meta = d.meta || {};
    const es = d.executive_summary || {};
    const km = es.key_metrics || {};
    const productName = meta.product_name || 'report';
    const date = meta.generated_at ? new Date(meta.generated_at).toLocaleDateString('zh-CN') : '';
    const catLabels = {hardware:'硬件/消费品',saas:'SaaS/效率工具',service:'服务/咨询',content:'内容/社群',b2b:'B2B/企业级',platform:'平台/双边市场',community:'社群/平台'};

    const analysisType = (meta && meta.analysis_type) || 'general';
    const isCrowdfunding = analysisType === 'crowdfunding';

    let md = `# ${productName} - 产品可行性分析报告\n\n`;
    md += `> 分析日期：${date}\n`;
    md += `> 品类：${catLabels[meta.category] || meta.category || '通用'}\n\n`;
    md += `> **免责声明**：本报告由 AI 辅助生成，仅供决策参考，不构成投资建议。\n\n---\n\n`;

    // Executive Summary
    md += `## 执行摘要\n\n`;
    if (es.one_line_summary) md += `**一句话概括**：${es.one_line_summary}\n\n`;
    if (es.conclusion) md += `${es.conclusion}\n\n`;
    if (km.grade) md += `| 指标 | 值 |\n|------|-----|\n| 评级 | ${km.grade} (${km.grade_label||''}) |\n| 总分 | ${km.total_score||'--'}/100 |\n`;
    if (km.market_size_tam) md += `| TAM | ${km.market_size_tam} |\n`;
    if (km.gross_margin_pct) md += `| 毛利率 | ${km.gross_margin_pct}% |\n`;
    if (km.payback_months) md += `| 回本周期 | ${km.payback_months}月 |\n`;
    md += '\n';
    if (es.top_strengths) { md += '**核心优势**\n'; es.top_strengths.forEach(s => { md += `- ${s}\n`; }); md += '\n'; }
    if (es.top_risks) { md += '**核心风险**\n'; es.top_risks.forEach(r => { md += `- ${r}\n`; }); md += '\n'; }
    if (es.recommendation) md += `**下一步建议**：${es.recommendation}\n\n`;

    // Project Profile
    md += `## 项目画像\n\n`;
    const pp = d.project_profile || {};
    if (pp.product_description) md += `${pp.product_description}\n\n`;
    if (pp.value_proposition) md += `**价值主张**：${pp.value_proposition}\n\n`;
    if (pp.target_users) { md += '**目标用户**：'; pp.target_users.forEach(u => { md += `${u}、`; }); md = md.slice(0,-1) + '\n\n'; }
    if (pp.core_features) { md += '**核心功能**\n'; pp.core_features.forEach(f => { md += `- ${f}\n`; }); md += '\n'; }

    if (isCrowdfunding) {
        // ---- Crowdfunding template ----

        // SWOT
        if (d.swot_analysis) {
            md += `## SWOT 分析\n\n`;
            [['优势','strengths'],['劣势','weaknesses'],['机会','opportunities'],['威胁','threats']].forEach(([l,k]) => {
                const items = d.swot_analysis[k] || [];
                md += `**${l}**\n`;
                items.forEach(item => { md += `- ${item.item}（${item.impact||'--'}）：${item.evidence||''} ${item.action ? '→ '+item.action : ''}\n`; });
                md += '\n';
            });
        }

        // Case Studies
        let csData = d.case_studies;
        if (csData && !Array.isArray(csData) && csData.similar_cases) {

        }

            if (cf.pricing_strategy) { md += '**定价档位**\n'; cf.pricing_strategy.forEach(ps => { md += `- ${ps.tier}：¥${ps.price}${ps.limit?'（限量'+ps.limit+'）':''} - ${ps.description||''}\n`; }); md += '\n'; }

                md += '\n';
            });
        }
    }

    md += `\n---\n\n> 报告生成时间：${new Date().toLocaleString('zh-CN')}\n`;

    a.href = url;
    a.download = `${productName}-可行性分析报告.md`;

}

// 自动加载模式：如果URL中有 ?json= 参数，自动加载并渲染
(function(){
    var params = new URLSearchParams(window.location.search);
    var jsonUrl = params.get('json');
    if (jsonUrl) {
        // 隐藏输入区域
        var inputArea = document.getElementById('input-area');
        if (inputArea) inputArea.style.display = 'none';
        
        // 加载JSON
        fetch(jsonUrl)
            .then(function(r) { return r.text(); })
            .then(function(text) {
                var ta = document.getElementById('json-input');
                if (ta) ta.value = text;
                // 等待Chart.js加载完成
                setTimeout(function() {
                    if (typeof renderReport === 'function') {
                        try { renderReport(); }
                        catch(e) { console.error('Render error:', e); }
                    }
                }, 1500);
            })
            .catch(function(e) { console.error('Failed to load JSON:', e); });
    }
})();
